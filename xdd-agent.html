<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小叮当 · 代理新增客户</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0F1F3D; min-height: 100vh; color: #fff; }

/* ── Login ── */
#login-screen {
  position: fixed; inset: 0; background: #0F1F3D;
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.login-box {
  background: #1A2E52; border-radius: 20px; padding: 40px 36px;
  width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center;
}
.login-logo { font-size: 52px; margin-bottom: 12px; }
.login-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: #8BA3C7; margin-bottom: 28px; }
.login-label { font-size: 12px; color: #8BA3C7; text-align: left; margin-bottom: 6px; }
.login-input {
  width: 100%; padding: 12px 14px; border-radius: 10px;
  border: 1.5px solid #2A4070; background: #0F1F3D;
  color: #fff; font-size: 15px; outline: none; margin-bottom: 8px;
}
.login-input:focus { border-color: #3B82F6; }
.login-err { color: #EF4444; font-size: 12px; margin-bottom: 10px; min-height: 18px; }
.login-btn {
  width: 100%; padding: 13px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #3B82F6, #1D4ED8);
  color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity .2s;
}
.login-btn:hover { opacity: .88; }

/* ── App ── */
#app { display: none; }
.top-bar {
  background: #1A2E52; padding: 14px 20px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  position: sticky; top: 0; z-index: 10;
}
.top-logo { font-size: 26px; }
.top-title { font-size: 16px; font-weight: 700; color: #fff; }
.top-badge {
  font-size: 11px; background: #3B82F6; color: #fff;
  padding: 3px 10px; border-radius: 20px; font-weight: 600;
}
.top-right { margin-left: auto; font-size: 12px; color: #8BA3C7; cursor: pointer; }
.top-right:hover { color: #fff; }

.main { max-width: 560px; margin: 0 auto; padding: 28px 20px 60px; }

/* ── Card ── */
.card {
  background: #1A2E52; border-radius: 16px; padding: 28px 24px;
  border: 1px solid #2A4070; margin-bottom: 20px;
}
.card-title {
  font-size: 15px; font-weight: 700; color: #93c5fd;
  margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
}
.card-tag {
  font-size: 10px; background: rgba(59,130,246,0.2); color: #60A5FA;
  padding: 2px 8px; border-radius: 10px; font-weight: 600;
}

/* ── Form ── */
.form-row { margin-bottom: 16px; }
.form-label {
  font-size: 12px; color: #8BA3C7; margin-bottom: 6px;
  display: flex; align-items: center; gap: 4px;
}
.req { color: #EF4444; font-size: 11px; }
.form-input {
  width: 100%; padding: 11px 14px; border-radius: 10px;
  border: 1.5px solid #2A4070; background: #0F1F3D;
  color: #fff; font-size: 14px; outline: none;
  transition: border-color .15s;
}
.form-input:focus { border-color: #3B82F6; }
.form-input::placeholder { color: #4B6080; }
.form-input.error { border-color: #EF4444; }

/* Currency + amount row */
.cur-row { display: flex; }
.cur-sel {
  padding: 0 10px; border-radius: 10px 0 0 10px;
  border: 1.5px solid #2A4070; border-right: none;
  background: #162444; color: #60A5FA; font-size: 13px;
  font-weight: 700; outline: none; cursor: pointer; min-width: 64px;
}
.cur-row .form-input { border-radius: 0 10px 10px 0; }

/* ── Buttons ── */
.btn-row { display: flex; gap: 12px; margin-top: 24px; }
.btn-cancel {
  flex: 1; padding: 13px; border-radius: 10px;
  border: 1.5px solid #2A4070; background: transparent;
  color: #8BA3C7; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.btn-cancel:hover { border-color: #60A5FA; color: #60A5FA; }
.btn-save {
  flex: 2; padding: 13px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #3B82F6, #1D4ED8);
  color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
  transition: opacity .2s;
}
.btn-save:hover { opacity: .88; }
.btn-save:disabled { opacity: .5; cursor: not-allowed; }

/* ── Note ── */
.form-note {
  text-align: center; font-size: 12px; color: #4B6080;
  margin-top: 16px; line-height: 1.6;
}

/* ── Success Toast ── */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: #10B981; color: #fff; font-size: 14px; font-weight: 600;
  padding: 13px 28px; border-radius: 30px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  transition: transform .3s ease; z-index: 999; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── Success Banner ── */
#success-banner {
  display: none; background: rgba(16,185,129,0.12); border: 1.5px solid #10B981;
  border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
  text-align: center;
}
#success-banner .s-icon { font-size: 28px; margin-bottom: 6px; }
#success-banner .s-title { font-size: 15px; font-weight: 700; color: #10B981; margin-bottom: 4px; }
#success-banner .s-sub { font-size: 12px; color: #6EE7B7; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🔔</div>
    <div class="login-title">小叮当服务团队群</div>
    <div class="login-sub">代理专用 · 新增客户</div>
    <div class="login-label">🔒 代理密码</div>
    <input class="login-input" type="password" id="pw-input" placeholder="输入密码..."
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" onclick="doLogin()">进入系统</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="top-bar">
    <div class="top-logo">🔔</div>
    <div class="top-title">小叮当服务团队群</div>
    <div class="top-badge">代理专用</div>
    <div class="top-right" onclick="doLogout()">退出登录</div>
  </div>

  <div class="main">

    <!-- Success Banner -->
    <div id="success-banner">
      <div class="s-icon">✅</div>
      <div class="s-title" id="s-title">客户已成功提交！</div>
      <div class="s-sub" id="s-sub">管理员将跟进处理</div>
    </div>

    <!-- Form Card -->
    <div class="card">
      <div class="card-title">
        新增客户 <span class="card-tag">代理简化版</span>
      </div>

      <div class="form-row">
        <div class="form-label">护照名字 <span class="req">*必填</span></div>
        <input class="form-input" id="f-name" type="text" placeholder="请输入护照上的全名">
      </div>

      <div class="form-row">
        <div class="form-label">护照号 <span class="req">*必填</span></div>
        <input class="form-input" id="f-passport" type="text" placeholder="请输入护照号码">
      </div>

      <div class="form-row">
        <div class="form-label">项目内容 <span class="req">*必填</span></div>
        <input class="form-input" id="f-project" type="text" placeholder="请输入项目内容（如：马来西亚电子签）">
      </div>

      <div class="form-row">
        <div class="form-label">押金 <span class="req">*必填</span></div>
        <div class="cur-row">
          <select class="cur-sel" id="f-deposit-cur" onchange="document.getElementById('f-price-cur').value=this.value">
            <option value="RM">RM</option>
            <option value="RMB">RMB</option>
          </select>
          <input class="form-input" id="f-deposit" type="number" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>

      <div class="form-row">
        <div class="form-label">卖价 <span class="req">*必填</span></div>
        <div class="cur-row">
          <select class="cur-sel" id="f-price-cur" onchange="document.getElementById('f-deposit-cur').value=this.value">
            <option value="RM">RM</option>
            <option value="RMB">RMB</option>
          </select>
          <input class="form-input" id="f-price" type="number" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>

      <div class="form-row">
        <div class="form-label">代理负责人 <span class="req">*必填</span></div>
        <input class="form-input" id="f-agent" type="text" placeholder="请输入代理负责人名字">
      </div>

      <div class="form-row">
        <div class="form-label">支付方式 <span style="font-size:11px;color:#4B6080;">（选填）</span></div>
        <input class="form-input" id="f-payment" type="text" placeholder="如：现金 / 转账 / 支付宝">
      </div>

      <div class="btn-row">
        <button class="btn-cancel" onclick="clearForm()">清除</button>
        <button class="btn-save" id="btn-save" onclick="submitCustomer()">✓ 保存客户</button>
      </div>

      <div class="form-note">除支付方式外，其它栏位为必填，填写完成后才能保存客户。</div>
    </div>

  </div>
</div>

<!-- Toast -->
<div id="toast">✅ 客户已提交成功！</div>

<script>
const AGENT_PW = 'daili4896';
const SB_URL = 'https://kkxdhkqatalgxbsogyly.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreGRoa3FhdGFsZ3hic29neWx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDQ4NTksImV4cCI6MjA5ODI4MDg1OX0.ewte2esrv1cOFQ5GngSA7dZqJkHCyiCcUXErxKxlClk';
const SB_H = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

function doLogin() {
  var pw = document.getElementById('pw-input').value.trim();
  var err = document.getElementById('login-err');
  if (pw === AGENT_PW) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    err.textContent = '❌ 密码错误，请重试';
    document.getElementById('pw-input').value = '';
    setTimeout(function(){ err.textContent = ''; }, 2000);
  }
}

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pw-input').value = '';
  clearForm();
}

function clearForm() {
  ['f-name','f-passport','f-project','f-deposit','f-price','f-agent','f-payment'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('error'); }
  });
  document.getElementById('f-deposit-cur').value = 'RM';
  document.getElementById('f-price-cur').value = 'RM';
  document.getElementById('success-banner').style.display = 'none';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

async function getNextNo() {
  try {
    var r = await fetch(SB_URL + '/rest/v1/customers?select=customer_no&order=customer_no.desc&limit=1', { headers: SB_H });
    var data = await r.json();
    if (Array.isArray(data) && data.length > 0 && data[0].customer_no) {
      return (parseInt(data[0].customer_no) || 0) + 1;
    }
  } catch(e) {}
  return 1;
}

async function submitCustomer() {
  // Validate required fields
  var fields = [
    { id: 'f-name', label: '护照名字' },
    { id: 'f-passport', label: '护照号' },
    { id: 'f-project', label: '项目内容' },
    { id: 'f-deposit', label: '押金' },
    { id: 'f-price', label: '卖价' },
    { id: 'f-agent', label: '代理负责人' }
  ];

  var valid = true;
  fields.forEach(function(f) {
    var el = document.getElementById(f.id);
    el.classList.remove('error');
    if (!el.value.trim()) {
      el.classList.add('error');
      valid = false;
    }
  });

  if (!valid) {
    showToast('⚠️ 请填写所有必填栏位');
    return;
  }

  var btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    var name     = document.getElementById('f-name').value.trim();
    var passport = document.getElementById('f-passport').value.trim();
    var project  = document.getElementById('f-project').value.trim();
    var depositCur = document.getElementById('f-deposit-cur').value;
    var deposit  = parseFloat(document.getElementById('f-deposit').value) || 0;
    var price    = parseFloat(document.getElementById('f-price').value) || 0;
    var agent    = document.getElementById('f-agent').value.trim();
    var payment  = document.getElementById('f-payment').value.trim();

    var today = new Date();
    var todayStr = today.getFullYear() + '-' +
      String(today.getMonth()+1).padStart(2,'0') + '-' +
      String(today.getDate()).padStart(2,'0');

    var nextNo = await getNextNo();

    var custData = {
      name: name,
      passport: passport,
      project: project,
      agent: agent,
      deposit: deposit,
      cost_type: depositCur,
      price: price,
      payment: payment || '',
      submit_date: todayStr,
      customer_no: nextNo,
      progress: '待递交',
      status: '未完成'
    };

    var r = await fetch(SB_URL + '/rest/v1/customers', {
      method: 'POST',
      headers: SB_H,
      body: JSON.stringify(custData)
    });

    if (r.ok) {
      // Show success banner
      var banner = document.getElementById('success-banner');
      banner.style.display = 'block';
      document.getElementById('s-title').textContent = '✅ 客户已成功提交！ #' + nextNo;
      document.getElementById('s-sub').textContent = name + ' · ' + project + ' · 管理员将跟进处理';
      showToast('✅ ' + name + ' 提交成功！');
      clearFormKeepBanner();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      var errText = await r.text();
      showToast('❌ 提交失败，请重试');
      console.error(errText);
    }
  } catch(e) {
    showToast('❌ 网络错误，请检查连接');
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = '✓ 保存客户';
}

function clearFormKeepBanner() {
  ['f-name','f-passport','f-project','f-deposit','f-price','f-agent','f-payment'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('error'); }
  });
  document.getElementById('f-deposit-cur').value = 'RM';
  document.getElementById('f-price-cur').value = 'RM';
}
</script>
</body>
</html>
